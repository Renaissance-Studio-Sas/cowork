<!doctype html>
<!--
  Minimal noVNC client — just the canvas. Bypasses vnc.html / vnc_lite.html
  entirely so there's no control bar, settings sidebar, "Send Ctrl-Alt-Del"
  button, etc. Imports noVNC's RFB module directly from the same webroot.

  Set up for true server-side resize: rfb.resizeSession = true tells noVNC to
  send an ExtendedDesktopSize request to x11vnc whenever this page's size
  changes. x11vnc translates that into xrandr calls on Xvfb, the window
  manager (fluxbox) resizes the maximized chrome window, and the page renders
  at the new pixel size. Result: dragging the artifact panel actually re-lays
  out the website rather than CSS-stretching a fixed-resolution bitmap.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Live browser</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
  #screen { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="screen"></div>
<script type="module">
  import RFB from "./core/rfb.js";

  const wsProto = location.protocol === "https:" ? "wss" : "ws";
  const url = `${wsProto}://${location.host}/websockify`;

  const rfb = new RFB(document.getElementById("screen"), url);
  rfb.scaleViewport = false;     // no client-side scaling — server matches size
  rfb.resizeSession = true;      // ask the server to resize to our viewport
  rfb.viewOnly = false;
  rfb.background = "#000";

  rfb.addEventListener("connect", () => console.log("[embed] connected"));
  rfb.addEventListener("disconnect", (e) =>
    console.log("[embed] disconnected", e.detail?.clean ? "clean" : "abrupt"),
  );

  // RFB.js already listens for window resize and sends new ExtendedDesktopSize
  // requests when resizeSession is true — nothing extra needed here.

  // ── Mac → Linux keyboard translation ──────────────────────────────────────
  // The remote is Linux Chrome, which uses Ctrl for shortcuts. Mac users
  // expect Cmd. Forwarding Cmd+V raw lands as Meta+V on the remote and gets
  // ignored. So on Mac clients we intercept Cmd-shortcuts here and synthesize
  // the Ctrl-equivalent on the remote.
  //
  // Paste is a special case in both directions — local and remote clipboards
  // are separate processes, so we also bridge the actual clipboard text.
  const isMacClient = /Mac/i.test(navigator.platform || "");
  const KS_CONTROL_L = 0xffe3;
  const KS_SHIFT_L   = 0xffe1;
  const KS_ALT_L     = 0xffe9;
  const KS_V         = 0x76;

  // X11 keysyms for keys whose name doesn't equal their char code.
  const NAMED_KEYSYM = {
    Enter: 0xff0d, Backspace: 0xff08, Tab: 0xff09, Escape: 0xff1b,
    ArrowLeft: 0xff51, ArrowUp: 0xff52, ArrowRight: 0xff53, ArrowDown: 0xff54,
    Home: 0xff50, End: 0xff57, PageUp: 0xff55, PageDown: 0xff56,
    Delete: 0xffff, Insert: 0xff63, " ": 0x20,
  };
  function keysymFromKey(key) {
    if (!key) return null;
    if (key.length === 1) return key.toLowerCase().charCodeAt(0);
    return NAMED_KEYSYM[key] ?? null;
  }

  function forwardPasteText(text) {
    if (!text) return;
    rfb.clipboardPasteFrom(text);
    // Tiny delay so the server has staged the clipboard before we send Ctrl+V.
    setTimeout(() => {
      rfb.sendKey(KS_CONTROL_L, "ControlLeft", true);
      rfb.sendKey(KS_V, "KeyV", true);
      rfb.sendKey(KS_V, "KeyV", false);
      rfb.sendKey(KS_CONTROL_L, "ControlLeft", false);
    }, 30);
  }

  // Native paste event — works without any Clipboard API permission, but
  // only fires when the page has a focusable paste target. noVNC keeps focus
  // on its canvas (so typing reaches the remote), so this rarely fires —
  // the keydown handler below is the primary paste path.
  document.addEventListener("paste", (e) => {
    const text = e.clipboardData?.getData("text/plain");
    if (!text) return;
    e.preventDefault();
    forwardPasteText(text);
  }, true);

  window.addEventListener("keydown", (e) => {
    // Cmd+V or Ctrl+V — bridge local clipboard to remote. Synchronously
    // preventDefault so noVNC doesn't also forward Meta+V raw, which would
    // race the synthesized Ctrl+V we send from the async clipboard read.
    const isPaste =
      (e.metaKey || e.ctrlKey) && !e.shiftKey && !e.altKey &&
      (e.key === "v" || e.key === "V");
    if (isPaste) {
      e.preventDefault();
      e.stopPropagation();
      navigator.clipboard.readText().then((t) => {
        if (t) forwardPasteText(t);
      }).catch(() => {
        // Permissions-Policy may block readText in some embeds; the native
        // `paste` event handler above is the primary path and should fire.
      });
      return;
    }

    if (!isMacClient) return;

    // Swallow the bare Meta key so the remote doesn't see a stuck modifier.
    if (e.key === "Meta") {
      e.preventDefault();
      e.stopPropagation();
      return;
    }

    // Cmd + <other key> — translate to remote Ctrl + <other key>.
    if (e.metaKey && !e.ctrlKey) {
      const ksym = keysymFromKey(e.key);
      if (ksym === null) return;
      e.preventDefault();
      e.stopPropagation();
      rfb.sendKey(KS_CONTROL_L, "ControlLeft", true);
      if (e.shiftKey) rfb.sendKey(KS_SHIFT_L, "ShiftLeft", true);
      if (e.altKey)   rfb.sendKey(KS_ALT_L,   "AltLeft",   true);
      rfb.sendKey(ksym, e.code, true);
      rfb.sendKey(ksym, e.code, false);
      if (e.altKey)   rfb.sendKey(KS_ALT_L,   "AltLeft",   false);
      if (e.shiftKey) rfb.sendKey(KS_SHIFT_L, "ShiftLeft", false);
      rfb.sendKey(KS_CONTROL_L, "ControlLeft", false);
    }
  }, true);

  window.addEventListener("keyup", (e) => {
    // Mirror the keydown swallow so the bare Meta keyup doesn't leak either.
    if (isMacClient && e.key === "Meta") {
      e.preventDefault();
      e.stopPropagation();
    }
  }, true);

  // ── Remote → local clipboard ──────────────────────────────────────────────
  // When the user copies inside the remote browser, mirror it onto the local
  // clipboard so they can paste outside the iframe too.
  rfb.addEventListener("clipboard", (e) => {
    const text = e.detail?.text;
    if (typeof text !== "string" || !text) return;
    navigator.clipboard.writeText(text).catch((err) =>
      console.warn("[embed] write to local clipboard failed:", err),
    );
  });
</script>
</body>
</html>
